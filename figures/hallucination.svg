<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
<rect width="680" height="420" fill="white"/>
<text x="74" y="26" font-size="17" font-weight="700" fill="#1b2733">How often each &quot;found a pattern&quot; in PURE RANDOM NOISE</text>
<text x="74" y="44" font-size="12" fill="#5b6b7b">There is nothing to find. Lower is more honest.</text>
<line x1="74" y1="356.0" x2="656" y2="356.0" stroke="#e6ebf0"/>
<text x="64" y="360.0" font-size="11" text-anchor="end" fill="#5b6b7b">0%</text>
<line x1="74" y1="296.0" x2="656" y2="296.0" stroke="#e6ebf0"/>
<text x="64" y="300.0" font-size="11" text-anchor="end" fill="#5b6b7b">20%</text>
<line x1="74" y1="236.0" x2="656" y2="236.0" stroke="#e6ebf0"/>
<text x="64" y="240.0" font-size="11" text-anchor="end" fill="#5b6b7b">40%</text>
<line x1="74" y1="176.0" x2="656" y2="176.0" stroke="#e6ebf0"/>
<text x="64" y="180.0" font-size="11" text-anchor="end" fill="#5b6b7b">60%</text>
<line x1="74" y1="116.0" x2="656" y2="116.0" stroke="#e6ebf0"/>
<text x="64" y="120.0" font-size="11" text-anchor="end" fill="#5b6b7b">80%</text>
<line x1="74" y1="56.0" x2="656" y2="56.0" stroke="#e6ebf0"/>
<text x="64" y="60.0" font-size="11" text-anchor="end" fill="#5b6b7b">100%</text>
<text transform="translate(20,206) rotate(-90)" font-size="12" text-anchor="middle" fill="#1b2733">of pure noise flagged as a “pattern”</text>
<line x1="74" y1="341.0" x2="656" y2="341.0" stroke="#5b6b7b" stroke-dasharray="5 4" stroke-width="1.3"/>
<text x="652" y="336.0" font-size="11" text-anchor="end" fill="#5b6b7b">honest floor (5%)</text>
<rect x="146.8" y="337.5" width="145.5" height="18.5" rx="3" fill="#2563eb"/>
<text x="219.5" y="330.5" font-size="12" font-weight="700" text-anchor="middle" fill="#2563eb">6%</text>
<text x="219.5" y="376" font-size="11.5" text-anchor="middle" fill="#1b2733">The honest method</text>
<rect x="437.8" y="56.0" width="145.5" height="300.0" rx="3" fill="#dc2626"/>
<text x="510.5" y="49.0" font-size="12" font-weight="700" text-anchor="middle" fill="#dc2626">100%</text>
<text x="510.5" y="376" font-size="11.5" text-anchor="middle" fill="#1b2733">The hallucinator</text>
</svg>